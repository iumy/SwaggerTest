name: Deploy Dual API Documentation
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Generate from Flask code
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate Code-First Spec
        run: |
          pip install "connexion[flask]<3.0" flask-swagger setuptools -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:.
          # We MUST call add_api to register the routes into the Flask map
          python3 -c "
          import json, connexion
          from flask_swagger import swagger
          from pdfserver.controllers import default_controller 
          from pdfserver import encoder
          # 1. Create the app
          app = connexion.App(__name__, specification_dir='./pdfserver/swagger/')
          app.app.json_encoder = encoder.JSONEncoder
          # 2. IMPORTANT: Load the API so routes are registered
          app.add_api('swagger.yaml')
          # 3. Extract the swagger from the now-populated Flask map
          print(json.dumps(swagger(app.app)))
          " > code_first.json
      - name: Build Code-First UI
        uses: Legion2/swagger-ui-action@v1
        with:
          output: public/code-first
          spec-file: code_first.json
          swagger-ui-config: '{"url": "code_first.json"}' 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy Specs to Public Folders
        run: |
          cp code_first.json public/code-first/
          cp pdfserver/swagger/swagger.yaml public/design-first/
      
      # 2. Use existing Stub spec
      - name: Build Design-First UI
        uses: Legion2/swagger-ui-action@v1
        with:
          output: public/design-first
          spec-file: 'pdfserver/swagger/swagger.yaml' 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 3. Deployment to a single GitHub Pages site
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Create Landing Page
        run: |
          cat <<EOF > public/index.html
          <html>
            <body>
              <h1>API Documentation Exercise</h1>
              <ul>
                <li><a href="code-first/">Code-First Approach (Generated from Flask)</a></li>
                <li><a href="design-first/">Design-First Approach (Swagger Stub)</a></li>
              </ul>
            </body>
          </html>
          EOF
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'  # Uploads the 'public' folder containing both subdirectories
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
